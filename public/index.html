<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>BrainLink</title>

		<link rel="shortcut icon" content="favicon.webp" />
	
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		
		<link rel="stylesheet" href="index.css" />
		
		<!-- Login Popup Styles -->
		<style>
			#login-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.6);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 2000;
			}

			#login-overlay.hidden {
				display: none;
			}

			.login-popup-box {
				background: white;
				padding: 40px;
				border-radius: 12px;
				width: 320px;
				text-align: center;
				box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
				animation: slideDown 0.3s ease-out;
			}

			@keyframes slideDown {
				from {
					opacity: 0;
					transform: translateY(-20px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.login-popup-box h2 {
				margin-top: 0;
				color: #333;
				font-size: 24px;
				margin-bottom: 20px;
			}

			.login-popup-box input {
				width: 100%;
				padding: 12px;
				margin: 10px 0;
				box-sizing: border-box;
				border: 1px solid #ddd;
				border-radius: 6px;
				font-size: 14px;
				transition: border-color 0.3s;
			}

			.login-popup-box input:focus {
				outline: none;
				border-color: #007bff;
				box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
			}

			.login-popup-box button {
				width: 100%;
				padding: 12px;
				background-color: #007bff;
				color: white;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				font-size: 16px;
				font-weight: 600;
				margin-top: 15px;
				transition: background-color 0.3s;
			}

			.login-popup-box button:hover {
				background-color: #0056b3;
			}

			.login-popup-box button:active {
				transform: scale(0.98);
			}

			#login-error-msg {
				color: #dc3545;
				font-size: 13px;
				margin-top: 12px;
				display: none;
			}

			#login-error-msg.show {
				display: block;
			}
		</style>

		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="browser-ui.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body>
		<!-- Login Overlay Popup -->
		<div id="login-overlay">
			<div class="login-popup-box">
				<h2>BrainLink Login</h2>
				<input type="text" id="login-username" placeholder="Username" required>
				<input type="password" id="login-password" placeholder="Password" required>
				<button onclick="loginCheck()">Login</button>
				<div id="login-error-msg"></div>
			</div>
		</div>

		<!-- Browser UI Container -->
		<div id="browser-container" class="browser-hidden">
			<div class="browser-header">
				<div class="browser-controls">
					<button id="btn-back" class="browser-btn" title="Back">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M15 18l-6-6 6-6"/>
						</svg>
					</button>
					<button id="btn-forward" class="browser-btn" title="Forward">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M9 18l6-6-6-6"/>
						</svg>
					</button>
					<button id="btn-refresh" class="browser-btn" title="Refresh">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<polyline points="23 4 23 10 17 10"></polyline>
							<path d="M20.49 15a9 9 0 1 1-2-8.12"></path>
						</svg>
					</button>
				</div>
				<input 
					id="address-bar" 
					type="text" 
					class="address-bar" 
					placeholder="Enter URL or search term..."
					spellcheck="false"
				/>
				<button id="btn-enter" class="btn-enter" title="Navigate">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<polyline points="6 9 12 15 18 9"></polyline>
					</svg>
				</button>
			</div>
			<div id="sj-frame-container" class="frame-container">
				<!-- Frame will be inserted here -->
			</div>
		</div>

		<!-- Landing Page -->
		<div id="landing-page" class="landing-page">
			<!-- Background gradient animation -->
			<div class="gradient-bg"></div>
			
			<div class="landing-content">
				<!-- Left side: Logo and description -->
				<div class="landing-left">
					<div class="logo-container">
						<img class="logo" src="sj.png" alt="Scramjet" />
						<h1 class="title">BrainLink</h1>
						<p class="subtitle">Powered by Brainjet</p>
					</div>
					<p class="description">
						Coded and developed by Enickel8,
						this is a browser that allows seamless browsing.
					</p>
				</div>

				<!-- Right side: Search form and enter button -->
				<div class="landing-right">
					<form id="sj-form" class="search-form">
						<input
							id="sj-search-engine"
							value="https://duckduckgo.com/?q=%s"
							type="hidden"
						/>
						<div class="search-container">
							<input 
								id="sj-address" 
								type="text" 
								class="search-input" 
								placeholder="Search the web freely..."
								spellcheck="false"
							/>
							<button type="submit" class="search-enter-btn" title="Search">
								<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
									<polyline points="6 9 12 15 18 9"></polyline>
								</svg>
							</button>
						</div>
					</form>
					<div id="sj-error" class="error-message"></div>
					<pre id="sj-error-code" class="error-code"></pre>
				</div>
			</div>
		</div>

		<!-- Login Script -->
		<script>
			// Credentials
			const VALID_USER = "Enickel8";
			const VALID_PASS = "USA250";

			// Check if user is already logged in
			window.addEventListener("load", function() {
				if (localStorage.getItem("brainlinkLoggedIn") !== "true") {
					document.getElementById("login-overlay").classList.remove("hidden");
				} else {
					document.getElementById("login-overlay").classList.add("hidden");
				}
			});

			// Login function
			function loginCheck() {
				const username = document.getElementById("login-username").value;
				const password = document.getElementById("login-password").value;
				const errorMsg = document.getElementById("login-error-msg");

				if (username === VALID_USER && password === VALID_PASS) {
					localStorage.setItem("brainlinkLoggedIn", "true");
					document.getElementById("login-overlay").classList.add("hidden");
				} else {
					errorMsg.textContent = "Invalid username or password.";
					errorMsg.classList.add("show");
					document.getElementById("login-password").value = "";
				}
			}

			// Allow Enter key to submit
			document.getElementById("login-password").addEventListener("keypress", function(e) {
				if (e.key === "Enter") {
					loginCheck();
				}
			});

			document.getElementById("login-username").addEventListener("keypress", function(e) {
				if (e.key === "Enter") {
					loginCheck();
				}
			});
		</script>
	</body>
</html>
