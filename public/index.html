		<body>
		<!-- Browser UI Container -->
		<div id="browser-container" class="browser-hidden">
			<div class="browser-header">
				<div class="browser-controls">
					<button id="btn-back" class="browser-btn" title="Back">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M15 18l-6-6 6-6"/>
						</svg>
					</button>
					<button id="btn-forward" class="browser-btn" title="Forward">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M9 18l6-6-6-6"/>
						</svg>
					</button>
					<button id="btn-refresh" class="browser-btn" title="Refresh">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<polyline points="23 4 23 10 17 10"></polyline>
							<path d="M20.49 15a9 9 0 1 1-2-8.12"></path>
						</svg>
					</button>
				</div>
				<input 
					id="address-bar" 
					type="text" 
					class="address-bar" 
					placeholder="Enter URL or search term..."
					spellcheck="false"
				/>
				<button id="btn-enter" class="btn-enter" title="Navigate">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<polyline points="6 9 12 15 18 9"></polyline>
					</svg>
				</button>
			</div>
			<div id="sj-frame-container" class="frame-container">
				<!-- Frame will be inserted here -->
			</div>
		</div>

		<!-- Landing Page -->
		<div id="landing-page" class="landing-page">
			<!-- Background gradient animation -->
			<div class="gradient-bg"></div>
			
			<div class="landing-content">
				<!-- Left side: Logo and description -->
				<div class="landing-left">
					<div class="logo-container">
						<img class="logo" src="sj.png" alt="Scramjet" />
						<h1 class="title">BrainLink</h1>
						<p class="subtitle">Powered by Brainjet</p>
					</div>
					<!-- Kept original description class for identical UI styling -->
					<p class="description">
						IP: <span id="hud-ip">Loading...</span> | <span id="hud-fps">0</span> FPS
					</p>
				</div>

				<!-- Right side: Search form and enter button -->
				<div class="landing-right">
					<form id="sj-form" class="search-form">
						<input
							id="sj-search-engine"
							value="https://duckduckgo.com"
							type="hidden"
						/>
						<div class="search-container">
							<input 
								id="sj-address" 
								type="text" 
								class="search-input" 
								placeholder="Search the web freely..."
								spellcheck="false"
							/>
							<button type="submit" class="search-enter-btn" title="Search">
								<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
									<polyline points="6 9 12 15 18 9"></polyline>
								</svg>
							</button>
						</div>
					</form>
					<div id="sj-error" class="error-message"></div>
					<pre id="sj-error-code" class="error-code"></pre>
				</div>
			</div>

			<!-- Footer -->
			<footer class="landing-footer">
				<!-- Replaced links with status counters keeping identical footer structure -->
				<div class="footer-links">
					<span>IP: <span id="footer-ip">Loading...</span></span>
					<span class="divider">•</span>
					<span><span id="footer-fps">0</span> FPS</span>
				</div>
				<span class="copyright">brainlink &copy; DB 2025</span>
			</footer>
		</div>

		<!-- Script to update both locations -->
		<script>
			// 1. Fetch IP
			fetch('https://ipify.org')
				.then(response => response.json())
				.then(data => {
					document.getElementById('hud-ip').textContent = data.ip;
					document.getElementById('footer-ip').textContent = data.ip;
				})
				.catch(err => {
					document.getElementById('hud-ip').textContent = 'Unavailable';
					document.getElementById('footer-ip').textContent = 'Unavailable';
				});

			// 2. Track FPS
			let lastCalledTime;
			let fpsCounter = 0;
			const hudFps = document.getElementById('hud-fps');
			const footerFps = document.getElementById('footer-fps');

			function updateFPS() {
				if (!lastCalledTime) {
					lastCalledTime = performance.now();
					fpsCounter = 0;
					requestAnimationFrame(updateFPS);
					return;
				}
				
				fpsCounter++;
				const delta = (performance.now() - lastCalledTime) / 1000;

				if (delta >= 1) {
					const currentFps = Math.round(fpsCounter / delta);
					hudFps.textContent = currentFps;
					footerFps.textContent = currentFps;
					fpsCounter = 0;
					lastCalledTime = performance.now();
				}
				requestAnimationFrame(updateFPS);
			}
			requestAnimationFrame(updateFPS);
		</script>
	</body>
