	<body>
		<!-- Browser UI Container -->
		<div id="browser-container" class="browser-hidden">
			<div class="browser-header">
				<div class="browser-controls">
					<button id="btn-back" class="browser-btn" title="Back">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M15 18l-6-6 6-6"/>
						</svg>
					</button>
					<button id="btn-forward" class="browser-btn" title="Forward">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M9 18l6-6-6-6"/>
						</svg>
					</button>
					<button id="btn-refresh" class="browser-btn" title="Refresh">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<polyline points="23 4 23 10 17 10"></polyline>
							<path d="M20.49 15a9 9 0 1 1-2-8.12"></path>
						</svg>
					</button>
				</div>
				<input 
					id="address-bar" 
					type="text" 
					class="address-bar" 
					placeholder="Enter URL or search term..."
					spellcheck="false"
				/>
				<button id="btn-enter" class="btn-enter" title="Navigate">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<polyline points="6 9 12 15 18 9"></polyline>
					</svg>
				</button>
			</div>
			<div id="sj-frame-container" class="frame-container">
				<!-- Frame will be inserted here -->
			</div>
		</div>

		<!-- Landing Page -->
		<div id="landing-page" class="landing-page">
			<!-- Background gradient animation -->
			<div class="gradient-bg"></div>
			
			<div class="landing-content">
				<!-- Left side: Logo and dynamic HUD info -->
				<div class="landing-left">
					<div class="logo-container">
						<img class="logo" src="sj.png" alt="Scramjet" />
						<h1 class="title">BrainLink</h1>
						<p class="subtitle">Powered by Brainjet</p>
					</div>
					<!-- HUD Container for IP and FPS -->
					<div class="hud-container" style="margin-top: 20px; font-family: monospace; color: #fff; font-size: 14px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 6px; display: inline-block; text-align: left;">
						<div>IP Address: <span id="hud-ip" style="color: #00ffcc;">Loading...</span></div>
						<div style="margin-top: 4px;">Performance: <span id="hud-fps" style="color: #ffcc00;">0</span> FPS</div>
					</div>
				</div>

				<!-- Right side: Search form and enter button -->
				<div class="landing-right">
					<form id="sj-form" class="search-form">
						<input
							id="sj-search-engine"
							value="https://duckduckgo.com"
							type="hidden"
						/>
						<div class="search-container">
							<input 
								id="sj-address" 
								type="text" 
								class="search-input" 
								placeholder="Search the web freely..."
								spellcheck="false"
							/>
							<button type="submit" class="search-enter-btn" title="Search">
								<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
									<polyline points="6 9 12 15 18 9"></polyline>
								</svg>
							</button>
						</div>
					</form>
					<div id="sj-error" class="error-message"></div>
					<pre id="sj-error-code" class="error-code"></pre>
				</div>
			</div>

			<!-- Footer Cleaned Up -->
			<footer class="landing-footer">
				<span class="copyright">brainlink &copy; DB 2025</span>
			</footer>
		</div>

		<!-- Real-time HUD Script Integration -->
		<script>
			// 1. Fetch and Display Public IP Address
			fetch('https://ipify.org')
				.then(response => response.json())
				.then(data => {
					document.getElementById('hud-ip').textContent = data.ip;
				})
				.catch(err => {
					document.getElementById('hud-ip').textContent = 'Unavailable';
				});

			// 2. High-Accuracy Real-Time FPS Tracker
			let lastCalledTime;
			let fpsCounter = 0;
			const fpsDisplay = document.getElementById('hud-fps');

			function updateFPS() {
				if (!lastCalledTime) {
					lastCalledTime = performance.now();
					fpsCounter = 0;
					requestAnimationFrame(updateFPS);
					return;
				}
				
				fpsCounter++;
				const delta = (performance.now() - lastCalledTime) / 1000;

				if (delta >= 1) {
					fpsDisplay.textContent = Math.round(fpsCounter / delta);
					fpsCounter = 0;
					lastCalledTime = performance.now();
				}
				requestAnimationFrame(updateFPS);
			}
			requestAnimationFrame(updateFPS);
		</script>
	</body>
